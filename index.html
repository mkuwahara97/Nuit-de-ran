<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nuit de ran">
<title>Nuit de ran</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0e;
  --surface: #141418;
  --surface2: #1c1c22;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --rose: #c47a8a;
  --text: #e8e0d4;
  --muted: #7a7468;
  --border: rgba(201,168,76,0.15);
  --r: 10px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Serif JP', serif; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.page { flex: 1; display: flex; flex-direction: column; }

/* Header */
.header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(180deg, rgba(201,168,76,0.05) 0%, transparent 100%);
  position: sticky; top: 0; z-index: 10;
}
.header-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--gold); letter-spacing: 0.12em; flex: 1; }
.header-logo em { font-style: italic; }
.header-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; margin-top: 2px; }

/* Search */
.search-wrap { padding: 14px 20px; }
.search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 16px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--muted); }

/* List */
.list { flex: 1; padding: 0 20px 100px; display: flex; flex-direction: column; gap: 10px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, var(--gold), var(--rose)); }
.card:hover, .card:active { border-color: rgba(201,168,76,0.4); background: var(--surface2); }
.card-name { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge { background: rgba(201,168,76,0.12); color: var(--gold); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
.badge-rose { background: rgba(196,122,138,0.12); color: var(--rose); }
.invite-label { color: var(--gold); font-size: 11px; }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 2.2; }

/* Page header */
.page-header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
.back-btn { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 24px; line-height: 1; padding: 0 4px; }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--gold); letter-spacing: 0.08em; }
.edit-btn { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--gold); border-radius: 8px; width: 38px; height: 38px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

/* Page body */
.page-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; padding-bottom: 40px; }

/* Section */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; }
.section-title { font-size: 10px; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
.info-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; font-size: 14px; flex-wrap: wrap; }
.info-label { color: var(--muted); font-size: 12px; min-width: 80px; }
.info-value { color: var(--text); }

/* Stats */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-box { background: var(--surface2); border-radius: 8px; padding: 12px 14px; }
.stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; margin-bottom: 6px; }
.stat-value { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--gold); line-height: 1.1; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.stat-highlight { grid-column: 1/-1; background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(196,122,138,0.05)); border: 1px solid rgba(201,168,76,0.2); }
.stat-value-big { font-size: 32px; }
.stat-unit { font-size: 14px; }

/* Day bars */
.day-bars { display: flex; gap: 6px; align-items: flex-end; height: 56px; margin-top: 8px; }
.day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.day-bar { width: 100%; background: rgba(201,168,76,0.12); border-radius: 3px 3px 0 0; min-height: 4px; }
.day-bar.active { background: linear-gradient(180deg, var(--gold2), var(--gold)); }
.day-label { font-size: 10px; color: var(--muted); }

/* Visit list */
.visit-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.visit-item:last-child { border-bottom: none; }
.visit-date { color: var(--text); }
.visit-day-label { color: var(--muted); font-size: 11px; }
.douhan-tag { font-size: 11px; color: var(--rose); background: rgba(196,122,138,0.1); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.douhan-dest { font-size: 12px; color: var(--rose); margin-top: 2px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 16px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.form-input:focus { border-color: var(--gold); }
.age-hint { margin-top: 6px; font-size: 12px; color: var(--gold); }
.checkbox-row { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; color: var(--text); padding: 4px 0; }
.checkbox-row input[type=checkbox] { accent-color: var(--gold); width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }

/* Buttons */
.btn { border: none; border-radius: 8px; padding: 14px 20px; font-family: inherit; font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; letter-spacing: 0.05em; }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #0c0c0e; width: 100%; }
.btn-gold:active { opacity: 0.85; }
.btn-gold:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-danger { background: rgba(196,122,138,0.15); border: 1px solid rgba(196,122,138,0.3); color: var(--rose); width: 100%; }
.btn-add-visit { background: rgba(201,168,76,0.08); border: 1px dashed rgba(201,168,76,0.3); color: var(--gold); width: 100%; border-radius: 8px; padding: 12px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s; }
.btn-add-visit:active { background: rgba(201,168,76,0.15); }
.del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 8px; flex-shrink: 0; }
.del-btn:active { color: var(--rose); }

/* FAB */
.fab { position: fixed; bottom: 28px; right: 20px; }
@media (min-width: 480px) { .fab { right: calc(50vw - 220px); } }
.fab-btn { width: 58px; height: 58px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #0c0c0e; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(201,168,76,0.4); display: flex; align-items: center; justify-content: center; }

.hidden { display: none !important; }
.muted { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===================== DATA =====================
const STORAGE_KEY = 'nuit-de-ran-v1';
const DAYS_JP = ['日','月','火','水','木','金','土'];

let state = {
  customers: [],
  view: 'list', // list | detail | form
  selectedId: null,
  search: '',
  form: newForm(),
};

function newForm() {
  return { id: null, name: '', birthday: '', visits: [], newVisitDate: '', newVisitIsDouhan: false, douhanDest: '' };
}

function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) state.customers = JSON.parse(d);
  } catch(e) {}
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.customers)); } catch(e) {}
}

// ===================== UTILS =====================
function calcAge(birthday) {
  if (!birthday) return null;
  const today = new Date(), b = new Date(birthday);
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return age;
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Date.now();
}

function intervalLabel(days) {
  if (!days) return '—';
  if (days >= 30) return `${Math.round(days/30)}ヶ月に1回`;
  if (days >= 7) return `${Math.round(days/7)}週間に1回`;
  return `${days}日に1回`;
}

function analyzeVisits(visits) {
  if (!visits || visits.length === 0) return null;
  const sorted = [...visits].sort((a,b) => new Date(a.date)-new Date(b.date));
  const dayCounts = {};
  sorted.forEach(v => {
    const d = DAYS_JP[new Date(v.date).getDay()];
    dayCounts[d] = (dayCounts[d]||0)+1;
  });
  const topDay = Object.entries(dayCounts).sort((a,b)=>b[1]-a[1])[0];
  let avgInterval = null;
  if (sorted.length >= 2) {
    const intervals = [];
    for (let i=1; i<sorted.length; i++) {
      intervals.push((new Date(sorted[i].date)-new Date(sorted[i-1].date))/(86400000));
    }
    avgInterval = Math.round(intervals.reduce((a,b)=>a+b,0)/intervals.length);
  }
  const today = new Date();
  const endOfMonth = new Date(today.getFullYear(), today.getMonth()+1, 0);
  const daysLeft = Math.ceil((endOfMonth-today)/86400000);
  let inviteEstimate = null;
  if (avgInterval) inviteEstimate = Math.max(0, Math.floor(daysLeft/avgInterval));
  const lastVisit = new Date(sorted[sorted.length-1].date);
  const daysSinceLast = Math.floor((today-lastVisit)/86400000);
  let nextVisitEst = null;
  if (avgInterval) {
    const next = new Date(lastVisit.getTime()+avgInterval*86400000);
    if (next > today) nextVisitEst = next;
  }
  return { topDay, dayCounts, avgInterval, inviteEstimate, daysSinceLast, nextVisitEst, sorted };
}

// ===================== RENDER =====================
function render() {
  const app = document.getElementById('app');
  if (state.view === 'list') app.innerHTML = renderList();
  else if (state.view === 'detail') app.innerHTML = renderDetail();
  else if (state.view === 'form') app.innerHTML = renderForm();
  bindEvents();
}

function renderList() {
  const filtered = state.customers.filter(c => c.name.includes(state.search));
  const cards = filtered.length === 0
    ? `<div class="empty">${state.customers.length===0
        ? 'まだ登録がありません<br>右下の ＋ からお客様を追加してください'
        : '該当するお客様が見つかりません'
      }</div>`
    : filtered.map(c => {
        const lastVisit = c.visits.length ? [...c.visits].sort((a,b)=>new Date(b.date)-new Date(a.date))[0] : null;
        const analysis = analyzeVisits(c.visits);
        const ageStr = c.birthday ? `<span class="muted">(${calcAge(c.birthday)}歳)</span>` : '';
        const lastStr = lastVisit ? `<span>最終: ${formatDate(lastVisit.date)}</span>` : '';
        const visitBadge = c.visits.length ? `<span class="badge">${c.visits.length}回来店</span>` : '';
        const douhanCnt = c.visits.filter(v=>v.isDouhan).length;
        const douhanBadge = douhanCnt ? `<span class="badge badge-rose">同伴${douhanCnt}回</span>` : '';
        const inviteStr = (analysis && analysis.inviteEstimate !== null)
          ? `<span class="invite-label">今月あと${analysis.inviteEstimate}回</span>` : '';
        return `<div class="card" data-id="${c.id}">
          <div class="card-name">${esc(c.name)} ${ageStr}</div>
          <div class="card-meta">${lastStr}${visitBadge}${douhanBadge}${inviteStr}</div>
        </div>`;
      }).join('');

  return `<div class="page">
    <div class="header">
      <div>
        <div class="header-logo">Nuit de <em>ran</em></div>
        <div class="header-sub">— my customers —</div>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="お客様名で検索…" value="${esc(state.search)}">
    </div>
    <div class="list">${cards}<div style="height:20px"></div></div>
    <div class="fab"><button class="fab-btn" id="addBtn">＋</button></div>
  </div>`;
}

function renderDetail() {
  const c = state.customers.find(x=>x.id===state.selectedId);
  if (!c) { state.view='list'; return renderList(); }
  const analysis = analyzeVisits(c.visits);
  const maxCount = analysis ? Math.max(...Object.values(analysis.dayCounts),1) : 1;

  const ageRow = c.birthday
    ? `<div class="info-row"><span class="info-label">生年月日</span><span class="info-value">${formatDate(c.birthday)}</span><span class="badge">${calcAge(c.birthday)}歳</span></div>` : '';
  const douhanCnt = c.visits.filter(v=>v.isDouhan).length;

  let analysisHtml = '';
  if (analysis) {
    const dayBars = DAYS_JP.map(d => {
      const count = analysis.dayCounts[d]||0;
      const h = Math.round((count/maxCount)*40)+4;
      return `<div class="day-col"><div class="day-bar${count>0?' active':''}" style="height:${h}px"></div><div class="day-label">${d}</div></div>`;
    }).join('');
    const nextStr = analysis.nextVisitEst
      ? `<div class="stat-sub">次回予測: ${formatDate(analysis.nextVisitEst)}</div>` : '';
    const inviteVal = analysis.inviteEstimate !== null ? analysis.inviteEstimate : '—';
    analysisHtml = `<div class="section">
      <div class="section-title">来店傾向</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-label">よく来る曜日</div>
          <div class="stat-value">${analysis.topDay ? analysis.topDay[0]+'曜' : '—'}</div>
          <div class="stat-sub">${analysis.topDay ? analysis.topDay[1]+'回' : ''}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">来店間隔</div>
          <div class="stat-value" style="font-size:16px;margin-top:4px">${intervalLabel(analysis.avgInterval)}</div>
          <div class="stat-sub">${analysis.avgInterval ? '平均 '+analysis.avgInterval+'日' : ''}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">前回から</div>
          <div class="stat-value">${analysis.daysSinceLast}<span class="stat-unit"> 日</span></div>
          ${nextStr}
        </div>
        <div class="stat-box stat-highlight">
          <div class="stat-label">今月あと誘える</div>
          <div class="stat-value stat-value-big">${inviteVal}<span class="stat-unit"> 回</span></div>
        </div>
      </div>
      <div style="margin-top:16px">
        <div class="stat-label">曜日別来店回数</div>
        <div class="day-bars">${dayBars}</div>
      </div>
    </div>`;
  }

  const visitItems = c.visits.length === 0
    ? `<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">来店記録なし</div>`
    : [...c.visits].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(v => {
        const douhanTag = v.isDouhan ? `<span class="douhan-tag">同伴</span>` : '';
        const douhanDest = v.isDouhan ? `<div class="douhan-dest">同伴${v.douhanDest ? ' — '+esc(v.douhanDest) : ''}</div>` : '';
        return `<div class="visit-item">
          <div style="flex:1">
            <div class="visit-date">${formatDate(v.date)}<span class="visit-day-label"> (${DAYS_JP[new Date(v.date).getDay()]})</span></div>
            ${douhanDest}
          </div>
          ${douhanTag}
        </div>`;
      }).join('');

  return `<div class="page">
    <div class="page-header">
      <button class="back-btn" id="backBtn">←</button>
      <div class="page-title">${esc(c.name)}</div>
      <button class="edit-btn" id="editBtn">✏️</button>
    </div>
    <div class="page-body">
      <div class="section">
        <div class="section-title">基本情報</div>
        <div class="info-row"><span class="info-label">お名前</span><span class="info-value">${esc(c.name)}</span></div>
        ${ageRow}
        <div class="info-row"><span class="info-label">来店回数</span><span class="info-value">${c.visits.length}回</span></div>
        <div class="info-row"><span class="info-label">同伴回数</span><span class="info-value">${douhanCnt}回</span></div>
      </div>
      ${analysisHtml}
      <div class="section">
        <div class="section-title">来店履歴</div>
        ${visitItems}
      </div>
      <button class="btn btn-danger" id="deleteBtn">削除する</button>
    </div>
  </div>`;
}

function renderForm() {
  const f = state.form;
  const isEdit = state.customers.some(c=>c.id===f.id);
  const ageHint = f.birthday ? `<div class="age-hint">→ ${calcAge(f.birthday)}歳</div>` : '';
  const douhanDestField = f.newVisitIsDouhan
    ? `<div class="form-group">
        <label class="form-label">同伴先</label>
        <input class="form-input" id="douhanDest" placeholder="例：和食 鮨○○" value="${esc(f.douhanDest)}">
       </div>` : '';

  const visitItems = [...f.visits].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(v => {
    const dest = v.isDouhan ? `<div style="font-size:11px;color:var(--rose)">同伴${v.douhanDest?' — '+esc(v.douhanDest):''}</div>` : '';
    return `<div class="visit-item">
      <div style="flex:1">
        <div>${formatDate(v.date)} (${DAYS_JP[new Date(v.date).getDay()]})</div>
        ${dest}
      </div>
      <button class="del-btn" data-visit-id="${v.id}">✕</button>
    </div>`;
  }).join('');
  const visitsSection = f.visits.length > 0
    ? `<div class="section"><div class="section-title">登録済み来店</div>${visitItems}</div>` : '';

  return `<div class="page">
    <div class="page-header">
      <button class="back-btn" id="backBtn">←</button>
      <div class="page-title">${isEdit ? '編集' : '新規登録'}</div>
    </div>
    <div class="page-body">
      <div class="section">
        <div class="section-title">基本情報</div>
        <div class="form-group">
          <label class="form-label">お名前 *</label>
          <input class="form-input" id="nameInput" placeholder="例：田中様" value="${esc(f.name)}">
        </div>
        <div class="form-group">
          <label class="form-label">生年月日（任意）</label>
          <input class="form-input" id="birthdayInput" type="date" value="${esc(f.birthday)}">
          ${ageHint}
        </div>
      </div>
      <div class="section">
        <div class="section-title">来店・同伴を追加</div>
        <div class="form-group">
          <label class="form-label">日付</label>
          <input class="form-input" id="visitDateInput" type="date" value="${esc(f.newVisitDate)}">
        </div>
        <div class="form-group">
          <label class="checkbox-row">
            <input type="checkbox" id="douhanCheck" ${f.newVisitIsDouhan ? 'checked' : ''}>
            同伴あり（来店日＝同伴日）
          </label>
        </div>
        ${douhanDestField}
        <button class="btn-add-visit" id="addVisitBtn">＋ 追加</button>
      </div>
      ${visitsSection}
      <button class="btn btn-gold" id="saveBtn" ${!f.name.trim() ? 'disabled' : ''}>保存する</button>
    </div>
  </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===================== EVENTS =====================
function bindEvents() {
  // List
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      state.selectedId = card.dataset.id;
      state.view = 'detail';
      render();
    });
  });
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', e => {
      state.search = e.target.value;
      render();
    });
  }
  const addBtn = document.getElementById('addBtn');
  if (addBtn) addBtn.addEventListener('click', () => {
    state.form = { ...newForm(), id: uuid() };
    state.view = 'form';
    render();
  });

  // Detail
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.addEventListener('click', () => {
    state.view = 'list';
    render();
  });
  const editBtn = document.getElementById('editBtn');
  if (editBtn) editBtn.addEventListener('click', () => {
    const c = state.customers.find(x=>x.id===state.selectedId);
    if (c) {
      state.form = { ...c, newVisitDate: '', newVisitIsDouhan: false, douhanDest: '' };
      state.view = 'form';
      render();
    }
  });
  const deleteBtn = document.getElementById('deleteBtn');
  if (deleteBtn) deleteBtn.addEventListener('click', () => {
    if (!confirm('このお客様を削除しますか？')) return;
    state.customers = state.customers.filter(c=>c.id!==state.selectedId);
    saveData();
    state.view = 'list';
    render();
  });

  // Form
  const nameInput = document.getElementById('nameInput');
  if (nameInput) {
    nameInput.addEventListener('input', e => {
      state.form.name = e.target.value;
      const saveBtn = document.getElementById('saveBtn');
      if (saveBtn) saveBtn.disabled = !e.target.value.trim();
    });
  }
  const birthdayInput = document.getElementById('birthdayInput');
  if (birthdayInput) {
    birthdayInput.addEventListener('change', e => {
      state.form.birthday = e.target.value;
      render();
    });
  }
  const visitDateInput = document.getElementById('visitDateInput');
  if (visitDateInput) {
    visitDateInput.addEventListener('change', e => { state.form.newVisitDate = e.target.value; });
  }
  const douhanCheck = document.getElementById('douhanCheck');
  if (douhanCheck) {
    douhanCheck.addEventListener('change', e => {
      state.form.newVisitIsDouhan = e.target.checked;
      render();
    });
  }
  const douhanDest = document.getElementById('douhanDest');
  if (douhanDest) {
    douhanDest.addEventListener('input', e => { state.form.douhanDest = e.target.value; });
  }
  const addVisitBtn = document.getElementById('addVisitBtn');
  if (addVisitBtn) addVisitBtn.addEventListener('click', () => {
    if (!state.form.newVisitDate) { alert('日付を選択してください'); return; }
    state.form.visits.push({
      id: uuid(),
      date: state.form.newVisitDate,
      isDouhan: state.form.newVisitIsDouhan,
      douhanDest: state.form.newVisitIsDouhan ? state.form.douhanDest : '',
    });
    state.form.newVisitDate = '';
    state.form.newVisitIsDouhan = false;
    state.form.douhanDest = '';
    render();
  });
  document.querySelectorAll('.del-btn[data-visit-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.form.visits = state.form.visits.filter(v=>v.id!==btn.dataset.visitId);
      render();
    });
  });
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    if (!state.form.name.trim()) return;
    const customer = { id: state.form.id, name: state.form.name, birthday: state.form.birthday, visits: state.form.visits };
    const exists = state.customers.find(c=>c.id===customer.id);
    if (exists) state.customers = state.customers.map(c=>c.id===customer.id ? customer : c);
    else state.customers.push(customer);
    saveData();
    state.view = 'list';
    render();
  });
}

// ===================== INIT =====================
loadData();
render();
</script>
</body>
</html>
